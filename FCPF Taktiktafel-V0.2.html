<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FC Pinggau-Friedberg – Taktiktafel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500&display=swap');
  :root {
    --green-dark:#1a5c1a; --green-mid:#2a8a2a; --green-field:#3db63d;
    --green-light:#6fd46f; --white:#ffffff; --black:#0d0d0d;
    --gray:#1e1e1e; --gray-mid:#2e2e2e; --accent:#c8f43a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--black);color:var(--white);font-family:'Inter',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;overflow:hidden;
    -webkit-user-select:none;user-select:none;}

  header{background:linear-gradient(135deg,var(--black) 0%,var(--green-dark) 100%);
    border-bottom:2px solid var(--green-mid);padding:8px 16px;
    display:flex;align-items:center;gap:14px;flex-shrink:0;}
  header img{height:56px;}
  header h1{font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;
    letter-spacing:2px;text-transform:uppercase;line-height:1.1;}
  header h1 span{display:block;font-size:0.7rem;color:var(--green-light);
    font-weight:400;letter-spacing:4px;}

  /* AGE CLASS TABS */
  .age-tabs{background:#161616;border-bottom:1px solid #333;display:flex;
    flex-shrink:0;overflow-x:auto;gap:0;}
  .age-tab{flex-shrink:0;padding:7px 14px;font-family:'Oswald',sans-serif;
    font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;
    background:transparent;border:none;color:#666;cursor:pointer;
    border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;}
  .age-tab:hover{color:#aaa;}
  .age-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

  .app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 118px);}

  /* SIDEBAR */
  .sidebar{width:210px;flex-shrink:0;background:var(--gray);
    border-right:1px solid #333;display:flex;flex-direction:column;overflow-y:auto;}
  .sidebar-section{border-bottom:1px solid #333;padding:10px;}
  .sidebar-section h3{font-family:'Oswald',sans-serif;font-size:0.6rem;
    letter-spacing:3px;text-transform:uppercase;color:var(--green-light);margin-bottom:7px;}

  .formation-btn{display:block;width:100%;background:var(--gray-mid,#2e2e2e);
    border:1px solid #444;color:var(--white);font-family:'Oswald',sans-serif;
    font-size:0.85rem;letter-spacing:1px;padding:7px 10px;margin-bottom:3px;
    cursor:pointer;border-radius:4px;text-align:left;transition:all 0.15s;}
  .formation-btn:hover{background:var(--green-dark);}
  .formation-btn.active{background:var(--green-mid);border-color:var(--green-light);color:var(--accent);}

  .color-row{display:flex;gap:6px;margin-bottom:5px;}
  .color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;
    border:2px solid transparent;transition:border-color 0.15s;}
  .color-swatch.active{border-color:var(--white);}
  .color-swatch.green{background:#2a8a2a;} .color-swatch.red{background:#c0392b;}
  .color-swatch.blue{background:#2980b9;} .color-swatch.yellow{background:#f39c12;}
  .color-swatch.white{background:#ccc;} .color-swatch.blk{background:#555;}

  .player-item{display:flex;align-items:center;gap:7px;padding:5px 7px;
    border-radius:4px;cursor:pointer;margin-bottom:2px;background:#2e2e2e;
    border:1px solid #3a3a3a;transition:background 0.15s;font-size:0.78rem;}
  .player-item:hover{background:var(--green-dark);}
  .player-item .num{width:18px;height:18px;border-radius:50%;display:flex;
    align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;flex-shrink:0;}

  .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;
    border-radius:4px;font-family:'Oswald',sans-serif;font-size:0.75rem;
    letter-spacing:1px;cursor:pointer;border:none;transition:all 0.15s;text-transform:uppercase;}
  .btn-green{background:var(--green-mid);color:#fff;}
  .btn-green:hover{background:var(--green-dark);}
  .btn-red{background:#8b2020;color:#fff;} .btn-red:hover{background:#6b1818;}
  .btn-accent{background:var(--accent);color:var(--black);}
  .btn-accent:hover{background:#a8d420;}
  .btn-gray{background:#444;color:#fff;} .btn-gray:hover{background:#555;}
  .btn-full{width:100%;justify-content:center;margin-bottom:3px;}

  /* DRAW TOOLS — big touch targets on iPad */
  .tool-btn{display:block;width:100%;background:#2e2e2e;border:1px solid #444;
    color:#fff;padding:9px 10px;border-radius:4px;cursor:pointer;
    font-size:0.8rem;font-family:'Oswald',sans-serif;letter-spacing:1px;
    transition:all 0.15s;white-space:nowrap;margin-bottom:3px;text-align:left;}
  .tool-btn:hover{background:var(--green-dark);}
  .tool-btn.active{background:var(--green-mid);border-color:var(--accent);color:var(--accent);}

  /* MAIN */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

  .toolbar{background:var(--gray);border-bottom:1px solid #333;padding:6px 12px;
    display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex-shrink:0;}
  .toolbar-sep{width:1px;height:26px;background:#444;margin:0 3px;}
  .frame-counter{font-family:'Oswald',sans-serif;font-size:1rem;
    color:var(--accent);min-width:55px;text-align:center;}
  #speed-range{width:70px;accent-color:var(--green-light);}

  .field-wrapper{flex:1;display:flex;align-items:center;justify-content:center;
    padding:12px;overflow:hidden;background:#111;}

  #field-svg{max-height:100%;max-width:100%;aspect-ratio:0.65;border-radius:6px;
    box-shadow:0 0 60px rgba(0,0,0,0.8),0 0 20px rgba(45,140,45,0.3);
    touch-action:none;}

  .anim-panel{background:var(--gray);border-top:1px solid #333;padding:7px 12px;
    display:flex;align-items:center;gap:9px;flex-shrink:0;}
  .anim-panel label{font-size:0.7rem;color:#888;font-family:'Oswald',sans-serif;
    letter-spacing:1px;text-transform:uppercase;}

  .info-bar{background:#161616;padding:3px 12px;font-size:0.65rem;color:#666;
    flex-shrink:0;font-family:'Oswald',sans-serif;letter-spacing:1px;}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);
    z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--gray);border:1px solid var(--green-mid);border-radius:8px;
    padding:20px;width:300px;box-shadow:0 0 30px rgba(0,0,0,0.9);}
  .modal h3{font-family:'Oswald',sans-serif;font-size:1rem;letter-spacing:2px;
    color:var(--green-light);margin-bottom:12px;}
  .modal input{width:100%;background:#111;border:1px solid #555;color:#fff;
    padding:8px;border-radius:4px;font-size:0.9rem;margin-bottom:8px;}
  .modal input:focus{outline:1px solid var(--green-mid);}
  .modal-btns{display:flex;gap:8px;flex-wrap:wrap;}

  /* Touch hint badge */
  .touch-hint{display:none;}
  @media (pointer:coarse){.touch-hint{display:inline;}}

  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:#111;}
  ::-webkit-scrollbar-thumb{background:var(--green-dark);border-radius:3px;}
</style>
</head>
<body>

<header>
  <img id="club-logo" src="" alt="FCPF Youngsters">
  <h1>Taktiktafel<span>FC Pinggau-Friedberg · Youngsters</span></h1>
</header>

<!-- AGE CLASS TABS -->
<div class="age-tabs" id="age-tabs">
  <button class="age-tab" onclick="selectAge('U10')">U10 · 4+1</button>
  <button class="age-tab" onclick="selectAge('U11')">U11 · 6+1</button>
  <button class="age-tab" onclick="selectAge('U12')">U12 · 6+1</button>
  <button class="age-tab" onclick="selectAge('U13')">U13 · 8+1</button>
  <button class="age-tab active" onclick="selectAge('U14')">U14+ · 10+1</button>
</div>

<div class="app">
  <aside class="sidebar">

    <div class="sidebar-section">
      <h3 id="formation-heading">Formation</h3>
      <div id="formation-buttons"></div>
    </div>

    <div class="sidebar-section">
      <h3>Teamfarbe</h3>
      <div style="font-size:0.6rem;color:#888;margin-bottom:3px">Eigene</div>
      <div class="color-row" id="home-colors">
        <div class="color-swatch green active" onclick="setTeamColor('#2a8a2a','home',this)" title="Grün"></div>
        <div class="color-swatch red"    onclick="setTeamColor('#c0392b','home',this)" title="Rot"></div>
        <div class="color-swatch blue"   onclick="setTeamColor('#2980b9','home',this)" title="Blau"></div>
        <div class="color-swatch yellow" onclick="setTeamColor('#f39c12','home',this)" title="Gelb"></div>
        <div class="color-swatch white"  onclick="setTeamColor('#cccccc','home',this)" title="Weiß"></div>
      </div>
      <div style="font-size:0.6rem;color:#888;margin-bottom:3px">Gegner</div>
      <div class="color-row" id="away-colors">
        <div class="color-swatch red active" onclick="setTeamColor('#c0392b','away',this)" title="Rot"></div>
        <div class="color-swatch blue"       onclick="setTeamColor('#2980b9','away',this)" title="Blau"></div>
        <div class="color-swatch yellow"     onclick="setTeamColor('#f39c12','away',this)" title="Gelb"></div>
        <div class="color-swatch green"      onclick="setTeamColor('#2a8a2a','away',this)" title="Grün"></div>
        <div class="color-swatch blk"        onclick="setTeamColor('#555','away',this)" title="Schwarz"></div>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Zeichnen <span class="touch-hint" style="color:#f39c12;font-size:0.55rem">✋ Touch</span></h3>
      <button class="tool-btn active" id="btn-move"       onclick="setDrawMode('move')">✥ Bewegen</button>
      <button class="tool-btn"        id="btn-arrow"      onclick="setDrawMode('arrow')">→ Laufweg</button>
      <button class="tool-btn"        id="btn-ball-arrow" onclick="setDrawMode('ball-arrow')">⚽ Ballweg</button>
      <button class="tool-btn"        id="btn-zone"       onclick="setDrawMode('zone')">▭ Raumzone</button>
      <button class="tool-btn"        id="btn-erase"      onclick="setDrawMode('erase')">✕ Löschen</button>
      <button class="btn btn-red btn-full" style="margin-top:5px" onclick="clearAnnotations()">🧹 Pfeile löschen</button>
    </div>

    <div class="sidebar-section">
      <h3>Spieler</h3>
      <div id="player-list"></div>
    </div>

    <div class="sidebar-section">
      <h3>Aktionen</h3>
      <button class="btn btn-green btn-full" onclick="addGegner()">＋ Gegner</button>
      <button class="btn btn-accent btn-full" onclick="resetFormation()">↺ Formation</button>
      <button class="btn btn-gray btn-full" onclick="toggleOpponent()">👥 Gegner ein/aus</button>
      <button class="btn btn-red btn-full" onclick="clearAll()">🗑 Alles löschen</button>
    </div>

  </aside>

  <div class="main">
    <div class="toolbar">
      <span style="font-family:Oswald;font-size:0.65rem;letter-spacing:2px;color:#888;text-transform:uppercase">Spielzug</span>
      <button class="btn btn-green" onclick="addFrame()">＋ Bild</button>
      <button class="btn btn-gray"  onclick="prevFrame()">◀</button>
      <span class="frame-counter"   id="frame-display">1 / 1</span>
      <button class="btn btn-gray"  onclick="nextFrame()">▶</button>
      <button class="btn btn-red"   onclick="deleteFrame()">✕</button>
      <div class="toolbar-sep"></div>
      <button class="btn btn-accent" id="play-btn" onclick="togglePlay()">▶ Play</button>
      <label style="font-size:0.65rem;color:#888;font-family:Oswald;letter-spacing:1px">SPD</label>
      <input type="range" id="speed-range" min="0.3" max="3" step="0.1" value="1">
      <div class="toolbar-sep"></div>
      <button class="btn btn-gray" onclick="exportSVG()">📷 Export</button>
    </div>

    <div class="field-wrapper">
      <svg id="field-svg" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="fieldGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#2d7a2d"/>
            <stop offset="25%"  stop-color="#35913a"/>
            <stop offset="50%"  stop-color="#2d7a2d"/>
            <stop offset="75%"  stop-color="#35913a"/>
            <stop offset="100%" stop-color="#2d7a2d"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0,10 3.5,0 7" fill="rgba(255,255,255,0.9)"/>
          </marker>
          <marker id="ballarrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0,10 3.5,0 7" fill="rgba(255,220,0,0.95)"/>
          </marker>
        </defs>
        <rect width="600" height="900" fill="url(#fieldGrad)"/>
        <rect x="0" y="0"   width="600" height="90" fill="rgba(0,0,0,0.04)"/>
        <rect x="0" y="180" width="600" height="90" fill="rgba(0,0,0,0.04)"/>
        <rect x="0" y="360" width="600" height="90" fill="rgba(0,0,0,0.04)"/>
        <rect x="0" y="540" width="600" height="90" fill="rgba(0,0,0,0.04)"/>
        <rect x="0" y="720" width="600" height="90" fill="rgba(0,0,0,0.04)"/>
        <g stroke="rgba(255,255,255,0.85)" stroke-width="2.5" fill="none">
          <rect x="30" y="30" width="540" height="840" rx="2"/>
          <line x1="30" y1="450" x2="570" y2="450"/>
          <circle cx="300" cy="450" r="75"/>
          <circle cx="300" cy="450" r="3" fill="white"/>
          <rect x="138" y="30"  width="324" height="132"/>
          <rect x="204" y="30"  width="192" height="60"/>
          <rect x="234" y="22"  width="132" height="18" stroke-width="2"/>
          <circle cx="300" cy="120" r="3" fill="white"/>
          <path d="M 228 162 A 75 75 0 0 1 372 162"/>
          <path d="M 30 60 A 30 30 0 0 0 60 30"/>
          <path d="M 570 60 A 30 30 0 0 1 540 30"/>
          <rect x="138" y="738" width="324" height="132"/>
          <rect x="204" y="810" width="192" height="60"/>
          <rect x="234" y="860" width="132" height="18" stroke-width="2"/>
          <circle cx="300" cy="780" r="3" fill="white"/>
          <path d="M 228 738 A 75 75 0 0 0 372 738"/>
          <path d="M 30 840 A 30 30 0 0 1 60 870"/>
          <path d="M 570 840 A 30 30 0 0 0 540 870"/>
        </g>
        <g id="annotations-layer"></g>
        <g id="players-layer"></g>
        <g id="ball-group">
          <circle id="ball" cx="300" cy="450" r="16" fill="#111" stroke="#fff" stroke-width="2"/>
          <text x="300" y="455" text-anchor="middle" dominant-baseline="middle" font-size="18" pointer-events="none">⚽</text>
        </g>
        <!-- Transparent overlay for drawing — sits on top but lets player events through -->
        <rect id="draw-overlay" x="0" y="0" width="600" height="900" fill="transparent" style="pointer-events:none"/>
      </svg>
    </div>

    <div class="anim-panel">
      <label>ANIMATION</label>
      <div style="flex:1;background:#111;height:6px;border-radius:3px;position:relative;cursor:pointer"
           id="timeline-bar" onclick="timelineClick(event)">
        <div id="timeline-progress" style="height:100%;background:var(--green-mid);border-radius:3px;width:0%;transition:width 0.1s"></div>
      </div>
      <span style="font-size:0.65rem;color:#888;font-family:Oswald">BILD</span>
      <span class="frame-counter" id="anim-display">1</span>
    </div>

    <div class="info-bar" id="info-bar">MODUS: BEWEGEN · Spieler/Ball ziehen · Doppeltipp = umbenennen · Doppeltipp Feld = Spieler hinzufügen</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>SPIELER BEARBEITEN</h3>
    <input type="text"   id="edit-name"   placeholder="Name" maxlength="20">
    <input type="number" id="edit-number" placeholder="Nummer" min="1" max="99">
    <div class="modal-btns">
      <button class="btn btn-green" onclick="savePlayerEdit()">✓ OK</button>
      <button class="btn btn-red"   onclick="removePlayer()">✕ Entfernen</button>
      <button class="btn btn-gray"  onclick="closeModal()">Abbrechen</button>
    </div>
  </div>
</div>

// ══════════════════════════════════════════════════════════
// AGE CLASS SELECTION
// ══════════════════════════════════════════════════════════
function selectAge(age) {
  currentAge = age;
  document.querySelectorAll('.age-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  buildFormationButtons();
  // Pick first formation of this age class
  const firstKey = Object.keys(AGE_CLASSES[age].formations)[0];
  applyFormation(firstKey);
}

function buildFormationButtons() {
  const age = AGE_CLASSES[currentAge];
  const container = document.getElementById('formation-buttons');
  container.innerHTML = '';
  document.getElementById('formation-heading').textContent = `Formation · ${age.label}`;
  Object.entries(age.formations).forEach(([key, f]) => {
    const btn = document.createElement('button');
    btn.className = 'formation-btn' + (key === currentFormation ? ' active' : '');
    btn.textContent = f.label || key;
    btn.onclick = () => applyFormation(key);
    container.appendChild(btn);
  });
}

function applyFormation(key) {
  currentFormation = key;
  document.querySelectorAll('.formation-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.formation-btn').forEach(b => {
    if (b.textContent === (AGE_CLASSES[currentAge].formations[key]?.label || key)) b.classList.add('active');
  });

  const formDef = AGE_CLASSES[currentAge].formations[key];
  if (!formDef) return;
  const roles = FORMATION_ROLES[key] || [];

  // Remove home players, keep away
  players = players.filter(p => p.team === 'away');

  formDef.home.forEach((xy, i) => {
    const isGK = i === 0;
    players.push({
      id: nextId++, x: xy[0], y: xy[1],
      name: roles[i] || (isGK ? 'TW' : `S${i}`),
      number: i + 1,
      team: isGK ? 'gk' : 'home'
    });
  });

  if (showOpponent && formDef.away) {
    players = players.filter(p => p.team !== 'away');
    formDef.away.forEach((xy, i) => {
      players.push({ id: nextId++, x: xy[0], y: xy[1],
        name: `G${i+1}`, number: i+1, team: 'away' });
    });
  }

  renderPlayers();
  saveFrame();
}

function resetFormation() { applyFormation(currentFormation); }

  if (team === 'home') {
    homeColor = color;
    document.querySelectorAll('#home-colors .color-swatch').forEach(s => s.classList.remove('active'));
  } else {
    awayColor = color;
    document.querySelectorAll('#away-colors .color-swatch').forEach(s => s.classList.remove('active'));
  }
  el.classList.add('active');
  renderPlayers();
}

function getPlayerColor(p) {
  if (p.team === 'gk')   return '#f39c12';
  if (p.team === 'away') return awayColor;
  return homeColor;
}

function renderPlayers() {
  playersLayer.innerHTML = '';

    circle.setAttribute('r','22');

    circle.setAttribute('stroke-width','2.5');

    const num = document.createElementNS('http://www.w3.org/2000/svg','text');
    num.setAttribute('text-anchor','middle');
    num.setAttribute('dominant-baseline','middle');
    num.setAttribute('y','-4');

    num.setAttribute('font-weight','700');
    num.setAttribute('font-family','Oswald,sans-serif');
    num.setAttribute('fill','#fff');
    num.setAttribute('pointer-events','none');
    num.textContent = p.number;

    const name = document.createElementNS('http://www.w3.org/2000/svg','text');
    name.setAttribute('text-anchor','middle');
    name.setAttribute('y','32');
    name.setAttribute('font-size','10');
    name.setAttribute('font-weight','600');
    name.setAttribute('font-family','Oswald,sans-serif');
    name.setAttribute('fill','#fff');
    name.setAttribute('stroke','#000');
    name.setAttribute('stroke-width','2.5');

    g.appendChild(circle);

    // Mouse
    g.addEventListener('mousedown',  e => onPlayerPointerDown(e, p.id, false));

    g.addEventListener('touchstart', e => onPlayerPointerDown(e, p.id, true), {passive:false});

    playersLayer.appendChild(g);
  });
  updatePlayerList();
}

// ══════════════════════════════════════════════════════════
// UNIFIED POINTER HANDLER (mouse + touch)
// ══════════════════════════════════════════════════════════
function getSVGPoint(e) {
  const pt = svg.createSVGPoint();
  if (e.touches && e.touches.length > 0) {
    pt.x = e.touches[0].clientX;
    pt.y = e.touches[0].clientY;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    pt.x = e.changedTouches[0].clientX;
    pt.y = e.changedTouches[0].clientY;
  } else {
    pt.x = e.clientX;
    pt.y = e.clientY;
  }
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

function onPlayerPointerDown(e, id, isTouch) {
  e.stopPropagation();

  // Double-tap / double-click → edit
  const now = Date.now();
  if (isTouch && lastTapTarget === id && (now - lastTapTime) < 400) {
    lastTapTime = 0; lastTapTarget = null;
    openModal(id); return;
  }
  lastTapTime = now; lastTapTarget = id;

  if (drawMode === 'erase') { removePlayerById(id); return; }
  if (drawMode !== 'move') return;

  if (isTouch) e.preventDefault();
  dragging = id;
  const sp = getSVGPoint(e);
  const player = players.find(pl => pl.id === id);
  dragOffX = sp.x - player.x;
  dragOffY = sp.y - player.y;

  if (isTouch) {
    document.addEventListener('touchmove', onPointerMoveTouch, {passive:false});
    document.addEventListener('touchend',  onPointerEndTouch);
  } else {
    document.addEventListener('mousemove', onPointerMoveMouse);
    document.addEventListener('mouseup',   onPointerEndMouse);
  }
}

function onPointerMoveMouse(e) {
  if (!dragging) return;
  const sp = getSVGPoint(e);
  movePlayer(dragging, sp.x - dragOffX, sp.y - dragOffY);
}
function onPointerMoveTouch(e) {
  if (!dragging) return;
  e.preventDefault();
  const sp = getSVGPoint(e);
  movePlayer(dragging, sp.x - dragOffX, sp.y - dragOffY);
}
function onPointerEndMouse() {
  dragging = null;
  document.removeEventListener('mousemove', onPointerMoveMouse);
  document.removeEventListener('mouseup',   onPointerEndMouse);
  saveFrame();
}
function onPointerEndTouch() {
  dragging = null;
  document.removeEventListener('touchmove', onPointerMoveTouch);
  document.removeEventListener('touchend',  onPointerEndTouch);
  saveFrame();
}

function movePlayer(id, nx, ny) {
  const player = players.find(p => p.id === id);
  if (!player) return;
  player.x = Math.max(15, Math.min(585, nx));
  player.y = Math.max(15, Math.min(885, ny));
  const g = document.getElementById('player-'+id);
  if (g) g.setAttribute('transform', `translate(${player.x},${player.y})`);
}

// ── Ball drag (mouse + touch) ──
const ballGroup = document.getElementById('ball-group');
ballGroup.addEventListener('mousedown',  e => startBallDrag(e, false));
ballGroup.addEventListener('touchstart', e => startBallDrag(e, true), {passive:false});

function startBallDrag(e, isTouch) {
  if (drawMode !== 'move') return;
  e.stopPropagation();
  if (isTouch) e.preventDefault();
  draggingBall = true;
  if (isTouch) {
    document.addEventListener('touchmove', moveBallTouch, {passive:false});
    document.addEventListener('touchend',  endBallTouch);
  } else {
    document.addEventListener('mousemove', moveBallMouse);
    document.addEventListener('mouseup',   endBallMouse);
  }
}

function setBallPos(sp) {
  const bx = Math.max(15, Math.min(585, sp.x));
  const by = Math.max(15, Math.min(885, sp.y));
  document.getElementById('ball').setAttribute('cx', bx);
  document.getElementById('ball').setAttribute('cy', by);
  document.querySelector('#ball-group text').setAttribute('x', bx);
  document.querySelector('#ball-group text').setAttribute('y', by+4);
}

function moveBallMouse(e) { if (!draggingBall) return; setBallPos(getSVGPoint(e)); }
function moveBallTouch(e) { if (!draggingBall) return; e.preventDefault(); setBallPos(getSVGPoint(e)); }
function endBallMouse()  { draggingBall=false; document.removeEventListener('mousemove',moveBallMouse); document.removeEventListener('mouseup',endBallMouse); saveFrame(); }
function endBallTouch()  { draggingBall=false; document.removeEventListener('touchmove',moveBallTouch); document.removeEventListener('touchend',endBallTouch); saveFrame(); }

// ══════════════════════════════════════════════════════════
// DRAW MODE — SVG events on the whole SVG (so touch works)
// ══════════════════════════════════════════════════════════
function setDrawMode(mode) {
  drawMode = mode;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('btn-'+mode);
  if (el) el.classList.add('active');

  const msgs = {
    move:       'BEWEGEN · Spieler/Ball ziehen · Doppeltipp = umbenennen · Doppeltipp Feld = Spieler hinzufügen',
    arrow:      'LAUFWEG · Finger/Maus ziehen für Pfeil',
    'ball-arrow':'BALLWEG · Finger/Maus ziehen für Ballpass',
    zone:       'RAUMZONE · Finger/Maus ziehen für Markierung',
    erase:      'LÖSCHEN · Tippen auf Pfeil/Zone zum Entfernen'
  };
  document.getElementById('info-bar').textContent = 'MODUS: ' + (msgs[mode]||'');
}

// SVG-level pointer events (handles both mouse and touch for drawing)
svg.addEventListener('mousedown',  onSVGPointerDown);
svg.addEventListener('mousemove',  onSVGPointerMove);
svg.addEventListener('mouseup',    onSVGPointerUp);
svg.addEventListener('touchstart', onSVGTouchStart, {passive:false});
svg.addEventListener('touchmove',  onSVGTouchMove,  {passive:false});
svg.addEventListener('touchend',   onSVGTouchEnd,   {passive:false});
svg.addEventListener('dblclick',   onFieldDblClick);

// Track if a pointer-down on the SVG was on a player/ball (skip drawing)
let drawBlocked = false;

function onSVGPointerDown(e) {
  // If already dragging a player/ball, block drawing
  if (dragging || draggingBall) { drawBlocked = true; return; }
  if (drawMode === 'move' || drawMode === 'erase') { drawBlocked = true; return; }
  // Check target is not a player token
  if (e.target.closest && e.target.closest('.player-token')) { drawBlocked = true; return; }
  if (e.target.id === 'ball' || e.target.closest('#ball-group')) { drawBlocked = true; return; }
  drawBlocked = false;
  isDrawing = true;
  drawStart = getSVGPoint(e);
  createTempDrawEl();
}

function onSVGTouchStart(e) {
  if (dragging || draggingBall) { drawBlocked = true; return; }
  if (drawMode === 'move' || drawMode === 'erase') { drawBlocked = true; return; }
  if (e.target.closest && e.target.closest('.player-token')) { drawBlocked = true; return; }
  if (e.target.id === 'ball' || e.target.closest('#ball-group')) { drawBlocked = true; return; }

  // Double-tap on field in move mode = add player (handled in touchend)
  drawBlocked = false;
  e.preventDefault();
  isDrawing = true;
  drawStart = getSVGPoint(e);
  createTempDrawEl();
}

function createTempDrawEl() {
  if (!drawStart) return;
  if (drawMode === 'zone') {
    tempDrawEl = document.createElementNS('http://www.w3.org/2000/svg','rect');
    tempDrawEl.setAttribute('fill','rgba(255,220,0,0.15)');
    tempDrawEl.setAttribute('stroke','rgba(255,220,0,0.7)');
    tempDrawEl.setAttribute('stroke-width','2');
    tempDrawEl.setAttribute('stroke-dasharray','6,3');
    tempDrawEl.setAttribute('rx','4');
  } else {
    tempDrawEl = document.createElementNS('http://www.w3.org/2000/svg','line');
    const isball = drawMode === 'ball-arrow';
    tempDrawEl.setAttribute('stroke', isball ? 'rgba(255,220,0,0.9)' : 'rgba(255,255,255,0.9)');
    tempDrawEl.setAttribute('stroke-width','2.5');
    tempDrawEl.setAttribute('stroke-dasharray', isball ? '8,4' : '6,3');
    tempDrawEl.setAttribute('marker-end', isball ? 'url(#ballarrow)' : 'url(#arrowhead)');
    tempDrawEl.setAttribute('x1', drawStart.x);
    tempDrawEl.setAttribute('y1', drawStart.y);
    tempDrawEl.setAttribute('x2', drawStart.x);
    tempDrawEl.setAttribute('y2', drawStart.y);
  }
  annotationsLayer.appendChild(tempDrawEl);
}

function updateTempDraw(pt) {
  if (!tempDrawEl || !drawStart) return;
  if (drawMode === 'zone') {
    const x = Math.min(drawStart.x, pt.x), y = Math.min(drawStart.y, pt.y);
    tempDrawEl.setAttribute('x', x); tempDrawEl.setAttribute('y', y);
    tempDrawEl.setAttribute('width',  Math.abs(pt.x - drawStart.x));
    tempDrawEl.setAttribute('height', Math.abs(pt.y - drawStart.y));
  } else {
    tempDrawEl.setAttribute('x2', pt.x);
    tempDrawEl.setAttribute('y2', pt.y);
  }
}

function onSVGPointerMove(e) { if (!isDrawing || drawBlocked) return; updateTempDraw(getSVGPoint(e)); }
function onSVGTouchMove(e)   { if (!isDrawing || drawBlocked) return; e.preventDefault(); updateTempDraw(getSVGPoint(e)); }

function finishDraw(pt) {
  if (!isDrawing || drawBlocked) { isDrawing = false; return; }
  isDrawing = false;
  const dist = drawStart ? Math.hypot(pt.x - drawStart.x, pt.y - drawStart.y) : 0;
  if (dist < 8) {
    if (tempDrawEl) annotationsLayer.removeChild(tempDrawEl);
    tempDrawEl = null; return;
  }
  if (!annotations[currentFrame]) annotations[currentFrame] = [];
  if (drawMode === 'zone') {
    annotations[currentFrame].push({
      type:'zone',
      x: parseFloat(tempDrawEl.getAttribute('x')),
      y: parseFloat(tempDrawEl.getAttribute('y')),
      w: parseFloat(tempDrawEl.getAttribute('width')),
      h: parseFloat(tempDrawEl.getAttribute('height'))
    });
  } else {
    annotations[currentFrame].push({
      type: drawMode, x1: drawStart.x, y1: drawStart.y, x2: pt.x, y2: pt.y
    });
  }
  tempDrawEl = null;
  saveFrame();
}

function onSVGPointerUp(e) { finishDraw(getSVGPoint(e)); }
function onSVGTouchEnd(e)  {
  if (!isDrawing || drawBlocked) {
    // Check double-tap on empty field in move mode
    if (drawMode === 'move' && !dragging && !draggingBall) {
      const now = Date.now();
      if (lastTapTarget === 'field' && (now - lastTapTime) < 400) {
        lastTapTime = 0; lastTapTarget = null;
        const pt = getSVGPoint(e);
        if (!e.target.closest('.player-token') && e.target.id !== 'ball') {
          addPlayerAt(pt.x, pt.y);
        }
        return;
      }
      lastTapTime = now; lastTapTarget = 'field';
    }
    return;
  }
  e.preventDefault();
  finishDraw(getSVGPoint(e));
}

function onFieldDblClick(e) {
  if (drawMode !== 'move') return;
  if (e.target.closest('.player-token') || e.target.id === 'ball') return;
  const pt = getSVGPoint(e);
  addPlayerAt(pt.x, pt.y);
}

function addPlayerAt(x, y) {
  players.push({
    id: nextId++, x, y,
    name: 'NEU',
    number: players.filter(p=>p.team==='home'||p.team==='gk').length + 1,
    team: 'home'
  });
  renderPlayers();
  saveFrame();
}

function clearAnnotations() {
  annotations[currentFrame] = [];
  renderAnnotations();
  saveFrame();
}

function renderAnnotations() {
  annotationsLayer.innerHTML = '';
  (annotations[currentFrame] || []).forEach((a, i) => {
    let el;
    if (a.type === 'zone') {
      el = document.createElementNS('http://www.w3.org/2000/svg','rect');
      el.setAttribute('x',a.x); el.setAttribute('y',a.y);
      el.setAttribute('width',a.w); el.setAttribute('height',a.h);
      el.setAttribute('fill','rgba(255,220,0,0.15)');
      el.setAttribute('stroke','rgba(255,220,0,0.7)');
      el.setAttribute('stroke-width','2');
      el.setAttribute('stroke-dasharray','6,3');
      el.setAttribute('rx','4');
    } else {
      el = document.createElementNS('http://www.w3.org/2000/svg','line');
      el.setAttribute('x1',a.x1); el.setAttribute('y1',a.y1);
      el.setAttribute('x2',a.x2); el.setAttribute('y2',a.y2);
      const isball = a.type === 'ball-arrow';
      el.setAttribute('stroke', isball?'rgba(255,220,0,0.9)':'rgba(255,255,255,0.9)');
      el.setAttribute('stroke-width','2.5');
      el.setAttribute('stroke-dasharray', isball?'8,4':'6,3');
      el.setAttribute('marker-end', isball?'url(#ballarrow)':'url(#arrowhead)');
    }
    if (drawMode === 'erase') {
      el.style.cursor = 'pointer';
      el.setAttribute('stroke-width','8'); // fatter hit zone
      el.style.strokeOpacity = '0.01'; // keep it nearly invisible but big
      const vis = el.cloneNode(true);
      vis.removeAttribute('style');
      vis.style.pointerEvents = 'none';
      const group = document.createElementNS('http://www.w3.org/2000/svg','g');
      const idx = i;
      group.appendChild(el);
      group.appendChild(vis);
      group.addEventListener('click',  () => deleteAnnotation(idx));
      group.addEventListener('touchend', () => deleteAnnotation(idx));
      annotationsLayer.appendChild(group);
      return;
    }
    annotationsLayer.appendChild(el);
  });
}

function deleteAnnotation(i) {
  annotations[currentFrame].splice(i,1);
  renderAnnotations();
  saveFrame();
}

// ══════════════════════════════════════════════════════════
// FRAMES
// ══════════════════════════════════════════════════════════
function saveFrame() {
  frames[currentFrame] = JSON.parse(JSON.stringify(players));
  const ball = document.getElementById('ball');
  frames[currentFrame]._ball = {
    x: parseFloat(ball.getAttribute('cx')),
    y: parseFloat(ball.getAttribute('cy'))
  };
  if (!annotations[currentFrame]) annotations[currentFrame] = [];
  updateFrameDisplay();
}

function loadFrame(idx) {
  const f = frames[idx];
  if (!f) return;
  players = JSON.parse(JSON.stringify(Array.isArray(f) ? f : []));
  renderPlayers();
  renderAnnotations();
  if (f._ball) {
    const b = f._ball;
    document.getElementById('ball').setAttribute('cx', b.x);
    document.getElementById('ball').setAttribute('cy', b.y);
    document.querySelector('#ball-group text').setAttribute('x', b.x);
    document.querySelector('#ball-group text').setAttribute('y', b.y+4);
  }
}

function addFrame() {
  saveFrame();
  const nf = JSON.parse(JSON.stringify(frames[currentFrame]));
  const na = JSON.parse(JSON.stringify(annotations[currentFrame]||[]));
  frames.splice(currentFrame+1,0,nf);
  annotations.splice(currentFrame+1,0,na);
  currentFrame++;
  updateFrameDisplay();
}

function deleteFrame() {
  if (frames.length <= 1) return;
  frames.splice(currentFrame,1);
  annotations.splice(currentFrame,1);
  currentFrame = Math.min(currentFrame, frames.length-1);
  loadFrame(currentFrame);
  updateFrameDisplay();
}

function prevFrame() { saveFrame(); if(currentFrame>0){currentFrame--;loadFrame(currentFrame);} updateFrameDisplay(); }
function nextFrame() { saveFrame(); if(currentFrame<frames.length-1){currentFrame++;loadFrame(currentFrame);} updateFrameDisplay(); }

function updateFrameDisplay() {
  document.getElementById('frame-display').textContent = `${currentFrame+1} / ${frames.length}`;
  document.getElementById('anim-display').textContent = currentFrame+1;
  const pct = frames.length > 1 ? (currentFrame/(frames.length-1))*100 : 0;
  document.getElementById('timeline-progress').style.width = pct+'%';
}

function timelineClick(e) {
  const bar = document.getElementById('timeline-bar');
  const r = bar.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  saveFrame();
  currentFrame = Math.max(0, Math.min(frames.length-1, Math.round(pct*(frames.length-1))));
  loadFrame(currentFrame);
  updateFrameDisplay();
}

function togglePlay() {
  isPlaying = !isPlaying;
  const btn = document.getElementById('play-btn');
  if (isPlaying) {
    btn.textContent = '⏸ Pause';
    btn.classList.replace('btn-accent','btn-red');
    saveFrame();
    const speed = parseFloat(document.getElementById('speed-range').value);
    playInterval = setInterval(() => {
      currentFrame = (currentFrame+1) % frames.length;
      loadFrame(currentFrame);
      updateFrameDisplay();
    }, Math.round(800/speed));
  } else {
    btn.textContent = '▶ Play';
    btn.classList.replace('btn-red','btn-accent');
    clearInterval(playInterval);
  }
}

// ══════════════════════════════════════════════════════════
// PLAYER MODAL
// ══════════════════════════════════════════════════════════
function openModal(id) {
  editingPlayerId = id;
  const p = players.find(pl => pl.id===id);
  document.getElementById('edit-name').value = p.name;
  document.getElementById('edit-number').value = p.number;
  document.getElementById('edit-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editingPlayerId = null;
}
function savePlayerEdit() {
  const p = players.find(pl => pl.id===editingPlayerId);
  if (p) {
    p.name   = document.getElementById('edit-name').value || p.name;
    p.number = parseInt(document.getElementById('edit-number').value)||p.number;
  }
  closeModal(); renderPlayers(); saveFrame();
}
function removePlayer()     { removePlayerById(editingPlayerId); closeModal(); }
function removePlayerById(id) {
  players = players.filter(p=>p.id!==id);
  renderPlayers(); saveFrame();
}

function addGegner() {
  players.push({id:nextId++,x:300,y:80,name:`G${players.filter(p=>p.team==='away').length+1}`,
    number:players.filter(p=>p.team==='away').length+1,team:'away'});
  renderPlayers(); saveFrame();
}

function clearAll() {
  if (!confirm('Alle Spieler und Pfeile löschen?')) return;
  players = [];
  annotations = frames.map(()=>[]);
  annotations[currentFrame] = [];
  renderPlayers(); renderAnnotations(); saveFrame();
}

function toggleOpponent() {
  showOpponent = !showOpponent;
  if (!showOpponent) {
    players = players.filter(p=>p.team!=='away');
  } else {
    const fd = AGE_CLASSES[currentAge].formations[currentFormation];
    if (fd?.away) fd.away.forEach((xy,i)=>{
      players.push({id:nextId++,x:xy[0],y:xy[1],name:`G${i+1}`,number:i+1,team:'away'});
    });
  }
  renderPlayers(); saveFrame();
}

// ══════════════════════════════════════════════════════════
// SIDEBAR PLAYER LIST
// ══════════════════════════════════════════════════════════
function updatePlayerList() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  players.forEach(p => {
    const div = document.createElement('div');
    div.className = 'player-item';
    const clr = getPlayerColor(p);
    div.innerHTML = `<div class="num" style="background:${clr}">${p.number}</div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
      <span style="font-size:0.6rem;color:#888">${p.team.toUpperCase()}</span>`;
    div.onclick = () => openModal(p.id);
    list.appendChild(div);
  });
}

function exportSVG() {
  const s = new XMLSerializer();
  const str = s.serializeToString(svg);
  const blob = new Blob([str],{type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`FCPF_Taktik_${currentAge}_Bild${currentFrame+1}.svg`;
  a.click(); URL.revokeObjectURL(url);
}
